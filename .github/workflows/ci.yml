name: CI (Typecheck, Lint, Tests, Build)

# Prueft jeden Push/PR auf main: TypeScript, ESLint, Unit-Tests (Vitest) und
# Production-Build. Rote Staende fallen damit sofort auf, bevor Cloudflare Pages
# den Stand deployt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version kommt aus dem packageManager-Feld der package.json — eine
      # zusätzliche version-Angabe hier führt zum Setup-Fehler (Konflikt).
      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @eventtech/web exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit-Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ---------------------------------------------------------------------------
  # E2E (ROADMAP P0.4, Etappe A3): das Netz fuer den UI-Neuschnitt.
  #
  # Bewusst ein EIGENER Job: Er braucht den kompletten Supabase-Stack (Docker) und
  # laeuft dadurch deutlich laenger als die Pruefkette. Faellt er aus, bleibt die
  # schnelle Rueckmeldung aus dem ci-Job erhalten.
  #
  # Der Stack wird frisch hochgefahren und per Migrationen befuellt — die Tests
  # legen ihre eigenen Daten an (Praefix TEST-E2E) und raeumen sie selbst wieder ab.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NOCH NICHT PFLICHT: Dieser Job konnte lokal nicht erprobt werden (er braucht
    # einen frischen Supabase-Stack auf dem Runner). Solange er nicht nachweislich
    # einmal gruen war, darf er die Pipeline nicht blockieren — sonst steht der
    # Build rot, ohne dass etwas am Code kaputt ist.
    #
    # >>> Sobald ein Lauf gruen ist: diese Zeile entfernen, dann ist E2E Pflicht. <<<
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Feste Version statt "latest" — deren Aufloesung ist zuletzt fehlgeschlagen
      # (gleiche Pinnung wie db-migrate.yml / db-backup.yml).
      - name: Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Supabase-Stack starten
        run: supabase start

      - name: Erst-Admin anlegen
        # Anlage ueber die Auth-API statt per SQL-INSERT: GoTrue verlangt in
        # auth.users mehr Pflichtfelder, als man von Hand sauber trifft — ein
        # handgeschriebener INSERT erzeugt einen Nutzer, der sich nicht anmelden
        # kann. Die API legt ihn korrekt an; die Rolle setzen wir danach per SQL
        # (profiles entsteht per Trigger). Nur CI-Wegwerf-Umgebung.
        run: |
          set -euo pipefail
          ANON=$(supabase status -o json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).ANON_KEY))")

          curl -sS -X POST "http://localhost:54321/auth/v1/signup" \
            -H "apikey: $ANON" -H "Content-Type: application/json" \
            -d '{"email":"admin@eventtech.local","password":"EventTech2026!"}' \
            -o signup.json -w "signup HTTP %{http_code}\n"

          # Bestaetigung erzwingen (falls Mail-Confirm aktiv) + Rolle setzen.
          psql "postgresql://postgres:postgres@localhost:54322/postgres" <<'SQL'
          update auth.users
             set email_confirmed_at = coalesce(email_confirmed_at, now())
           where email = 'admin@eventtech.local';
          update public.profiles set role = 'admin' where email = 'admin@eventtech.local';
          select email, role from public.profiles;
          SQL

          # Beweis, dass die Anmeldung wirklich funktioniert — sonst scheitern die
          # Tests spaeter mit einem irrefuehrenden Timeout statt hier mit Klartext.
          CODE=$(curl -s -o login.json -w "%{http_code}" -X POST \
            "http://localhost:54321/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON" -H "Content-Type: application/json" \
            -d '{"email":"admin@eventtech.local","password":"EventTech2026!"}')
          echo "login HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::error::Testnutzer kann sich nicht anmelden (HTTP $CODE) — E2E waere sinnlos."
            head -c 400 login.json; exit 1
          fi

      - name: Anon-Key fuer die Web-App setzen
        # Der Dev-Server liest VITE_SUPABASE_ANON_KEY; auf dem Runner gibt es keine
        # .env, deshalb aus `supabase status` uebernehmen.
        run: |
          ANON=$(supabase status -o json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{console.log(JSON.parse(s).ANON_KEY)})")
          echo "VITE_SUPABASE_ANON_KEY=$ANON" >> apps/web/.env
          echo "VITE_SUPABASE_URL=http://localhost:54321" >> apps/web/.env

      - name: Playwright-Browser
        run: pnpm --filter @eventtech/web exec playwright install --with-deps chromium

      - name: E2E-Tests
        run: pnpm --filter @eventtech/web exec playwright test

      - name: Bericht bei Fehlschlag sichern
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
