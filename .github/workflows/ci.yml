name: CI (Typecheck, Lint, Tests, Build)

# Prueft jeden Push/PR auf main: TypeScript, ESLint, Unit-Tests (Vitest) und
# Production-Build. Rote Staende fallen damit sofort auf, bevor Cloudflare Pages
# den Stand deployt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version kommt aus dem packageManager-Feld der package.json — eine
      # zusätzliche version-Angabe hier führt zum Setup-Fehler (Konflikt).
      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @eventtech/web exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit-Tests
        run: pnpm test

      - name: Build
        run: pnpm build
