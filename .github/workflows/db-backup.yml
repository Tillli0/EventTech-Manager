name: Supabase DB Backup (Produktion)

# Sichert die Supabase-Cloud-Datenbank automatisch — taeglich per Zeitplan und jederzeit
# manuell ausloesbar. Erzeugt ein wiederherstellbares logisches Backup in drei Teilen
# (Rollen, Schema, Daten) und legt es als herunterladbares GitHub-Artefakt ab. Die
# Aufbewahrung (retention-days) uebernimmt die Rotation: alte Backups verfallen von selbst.
#
# ROADMAP P0.1 — beide Stufen: Stufe 1 = Datenbank (drei SQL-Teile), Stufe 2 = alle
# Storage-Dateien (Fotos, Dokumente, Firmenlogo) als zweites Artefakt. Ohne Stufe 2 waere
# "es kann nichts verloren gehen" nicht wahr: Der Restore-Drill vom 2026-07-18 hat gezeigt,
# dass die Datei-METADATEN zwar zurueckkommen, die Dateien selbst aber fehlten.
#
# "Ruhig by default": Ohne die noetigen Secrets ueberspringt der Workflow alles (gruen),
# genau wie db-migrate.yml. Benoetigte GitHub-Secrets (dieselben wie db-migrate):
#   SUPABASE_ACCESS_TOKEN  - Supabase-Account -> Access Tokens
#   SUPABASE_DB_PASSWORD   - DB-Passwort des Cloud-Projekts
#   SUPABASE_PROJECT_REF   - Projekt-Ref des Cloud-Projekts
#
# Erst-Beweis / manueller Lauf: Repo -> Actions -> "Supabase DB Backup (Produktion)"
# -> "Run workflow". Danach das Artefakt unten am Lauf herunterladen.
# Wiederherstellung: siehe DEPLOY.md ("Backup & Restore").

on:
  schedule:
    # Taeglich 03:14 UTC (nachts, ausserhalb der Nutzung; ungerade Minute meidet die
    # volle Stunde, zu der GitHub-Cron am staerksten ausgelastet ist).
    - cron: "14 3 * * *"
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Secrets vorhanden?
        id: guard
        run: |
          if [ -n "$SUPABASE_PROJECT_REF" ] && [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Supabase-Secrets noch nicht gesetzt – Backup uebersprungen."
          fi

      - name: Zeitstempel
        if: steps.guard.outputs.ready == 'true'
        id: stamp
        run: echo "value=$(date -u +%Y-%m-%d_%H%M)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4

      # Feste Version statt "latest" — deren Aufloesung ist zuletzt fehlgeschlagen
      # (gleiche Pinnung wie db-migrate.yml).
      - name: Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Projekt verknuepfen
        if: steps.guard.outputs.ready == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Datenbank dumpen (Rollen + Schema + Daten)
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -euo pipefail
          mkdir -p backup
          supabase db dump --linked --role-only -f backup/01_roles.sql
          supabase db dump --linked            -f backup/02_schema.sql
          supabase db dump --linked --data-only --use-copy -f backup/03_data.sql
          # Kurz-Manifest fuer schnelle Sichtpruefung des Artefakts.
          {
            echo "EventTech-Manager DB-Backup"
            echo "erstellt (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
            echo "projekt-ref:    $SUPABASE_PROJECT_REF"
            echo ""
            echo "Dateien (Zeilen / Groesse):"
            for f in backup/01_roles.sql backup/02_schema.sql backup/03_data.sql; do
              printf '  %-20s %8s Zeilen  %8s\n' "$(basename "$f")" "$(wc -l < "$f")" "$(du -h "$f" | cut -f1)"
            done
          } | tee backup/00_manifest.txt

      - name: Nicht-leer pruefen
        if: steps.guard.outputs.ready == 'true'
        run: |
          set -euo pipefail
          # Das Datenfile muss echte Inhalte haben — sonst ist etwas schiefgelaufen.
          if [ ! -s backup/03_data.sql ]; then
            echo "::error::Daten-Dump ist leer — Backup abgebrochen."
            exit 1
          fi

      - name: Als Artefakt ablegen
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.stamp.outputs.value }}
          path: backup/
          retention-days: 90
          if-no-files-found: error

      # ---------------------------------------------------------------------
      # Stufe 2: Storage-Dateien (ROADMAP P0.1 Stufe 2, Etappe A2)
      #
      # Bewusst NACH dem DB-Upload: Schlaegt der Storage-Teil fehl, ist das
      # Datenbank-Backup bereits sicher abgelegt.
      #
      # Warum ueberhaupt: Der Restore-Drill (A1) hat gezeigt, dass
      # `storage.objects` zwar wiederhergestellt wird, die DATEIEN aber fehlten —
      # z. B. zeigte der Eintrag fuers Firmenlogo ins Leere, und das Logo steckt
      # in jedem Rechnungs- und Angebots-PDF.
      #
      # Buckets werden ABSICHTLICH dynamisch aufgelistet statt fest verdrahtet:
      # so wird ein spaeter angelegter Bucket automatisch mitgesichert. (Beim
      # Planen dieser Etappe waren vier Buckets angenommen — es sind fuenf.)
      #
      # ACHTUNG: `supabase storage` braucht derzeit `--experimental`. Bricht der
      # Schritt nach einem CLI-Update, ist dieses Flag der erste Verdaechtige.
      # ---------------------------------------------------------------------
      - name: Storage-Dateien sichern
        if: steps.guard.outputs.ready == 'true'
        id: storage
        run: |
          set -euo pipefail
          mkdir -p storage-backup

          # Bucket-Liste holen (Zeilen der Form "name/")
          supabase storage ls ss:/// --experimental --linked 2>/dev/null \
            | sed 's#/$##' | grep -v '^$' | grep -v 'Initialising' > buckets.txt || true

          if [ ! -s buckets.txt ]; then
            echo "::error::Keine Buckets gefunden — Storage-Backup abgebrochen (lieber lauter Fehler als stilles Teil-Backup)."
            exit 1
          fi

          echo "Gefundene Buckets:"; cat buckets.txt

          # Relativer Zielpfad ist Absicht: absolute Pfade werden vom cp-Befehl
          # teils als Protokoll fehlinterpretiert.
          cd storage-backup
          while read -r bucket; do
            [ -z "$bucket" ] && continue
            echo "→ $bucket"
            supabase storage cp -r "ss:///$bucket" "./$bucket" \
              --experimental --linked --workdir "$GITHUB_WORKSPACE" 2>&1 \
              | grep -v 'Initialising' || true
          done < ../buckets.txt
          cd ..

          # Manifest je Bucket
          {
            echo "EventTech-Manager Storage-Backup"
            echo "erstellt (UTC): $(date -u +'%Y-%m-%d %H:%M:%S')"
            echo ""
            printf '  %-22s %8s Dateien  %10s\n' "BUCKET" "ANZAHL" "GROESSE"
            while read -r bucket; do
              [ -z "$bucket" ] && continue
              n=$(find "storage-backup/$bucket" -type f 2>/dev/null | wc -l)
              s=$(du -sh "storage-backup/$bucket" 2>/dev/null | cut -f1 || echo "0")
              printf '  %-22s %8s Dateien  %10s\n' "$bucket" "$n" "$s"
            done < buckets.txt
          } | tee storage-backup/00_manifest.txt

          TOTAL_FILES=$(find storage-backup -type f -not -name '00_manifest.txt' | wc -l)
          TOTAL_MB=$(du -sm storage-backup | cut -f1)
          echo "files=$TOTAL_FILES" >> "$GITHUB_OUTPUT"
          echo "size_mb=$TOTAL_MB"   >> "$GITHUB_OUTPUT"

          # Groessen-Wachposten: lieber lauter Fehler als stilles Teil-Backup.
          # GitHub-Artefakte sind fuer Dateien in dieser Groessenordnung gedacht;
          # darueber gehoert das Backup auf ein externes Ziel (z. B. Cloudflare R2).
          if [ "$TOTAL_MB" -gt 2000 ]; then
            echo "::error::Storage-Backup ist ${TOTAL_MB} MB gross (> 2 GB). GitHub-Artefakte sind dafuer der falsche Ort — bitte auf ein externes Ziel (z. B. Cloudflare R2) umstellen, statt still nur einen Teil zu sichern."
            exit 1
          fi
          if [ "$TOTAL_MB" -gt 1000 ]; then
            echo "::warning::Storage-Backup ist ${TOTAL_MB} MB gross. Ab 2 GB bricht dieser Schritt bewusst ab — rechtzeitig ein externes Ziel einrichten."
          fi

      - name: Storage als Artefakt ablegen
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: storage-backup-${{ steps.stamp.outputs.value }}
          path: storage-backup/
          retention-days: 90
          if-no-files-found: error

      - name: Zusammenfassung
        if: steps.guard.outputs.ready == 'true'
        run: |
          {
            echo "### Backup erstellt ✅"
            echo ""
            echo "**Datenbank**"
            echo '```'
            cat backup/00_manifest.txt
            echo '```'
            echo ""
            echo "**Storage-Dateien**"
            echo '```'
            cat storage-backup/00_manifest.txt
            echo '```'
            echo ""
            echo "Artefakte (Aufbewahrung 90 Tage):"
            echo "- **db-backup-${{ steps.stamp.outputs.value }}**"
            echo "- **storage-backup-${{ steps.stamp.outputs.value }}** — ${{ steps.storage.outputs.files }} Dateien, ${{ steps.storage.outputs.size_mb }} MB"
            echo ""
            echo "> Wiederherstellung: siehe \`DEPLOY.md\` → *Backup & Restore*. Ziel muss ein"
            echo "> **frisches Supabase-Projekt** sein, keine leere Datenbank."
          } >> "$GITHUB_STEP_SUMMARY"
