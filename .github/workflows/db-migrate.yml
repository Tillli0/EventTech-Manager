name: Supabase DB Migrate (Produktion)

# Spielt neue Migrationen automatisch in die Supabase-Cloud-DB, sobald sich unter
# supabase/migrations/** etwas aendert und auf main gepusht wird. So geht beim Pushen
# nicht nur der Frontend-Code (ueber die Cloudflare-Pages-Git-Integration), sondern
# auch das Datenbankschema live.
#
# Benoetigte GitHub-Secrets (Repo -> Settings -> Secrets and variables -> Actions):
#   SUPABASE_ACCESS_TOKEN  - Supabase-Account -> Access Tokens
#   SUPABASE_DB_PASSWORD   - DB-Passwort des Cloud-Projekts
#   SUPABASE_PROJECT_REF   - Projekt-Ref des Cloud-Projekts (aus der Projekt-URL)
#
# Solange diese Secrets nicht gesetzt sind, ueberspringt der Workflow alles (gruen).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Secrets vorhanden?
        id: guard
        run: |
          if [ -n "$SUPABASE_PROJECT_REF" ] && [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Supabase-Secrets noch nicht gesetzt – Migration uebersprungen."
          fi

      - name: Checkout
        if: steps.guard.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Supabase CLI
        if: steps.guard.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migrationen in die Cloud pushen
        if: steps.guard.outputs.ready == 'true'
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
