<!doctype html>
<html lang="de" data-theme="creme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F2EFE9" />
    <!--
      Gespeichertes Theme VOR dem ersten Rendern setzen. Liefe das erst in React,
      würde die Seite kurz im Standard-Theme aufblitzen und dann umspringen
      (der bekannte „Theme-Flash"). Bewusst inline und ohne Abhängigkeiten.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("eventtech.theme");
          if (t === "creme" || t === "weiss" || t === "dark") {
            document.documentElement.dataset.theme = t;
            var farbe = t === "dark" ? "#0F1115" : t === "weiss" ? "#F6F7FA" : "#F2EFE9";
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", farbe);
          }
        } catch (e) {
          /* Kein Zugriff auf localStorage — dann bleibt der Standard stehen. */
        }
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EventTech" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>EventTech Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-bg text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
